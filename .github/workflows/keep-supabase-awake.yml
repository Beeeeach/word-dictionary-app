name: Keep Supabase Awake

# Supabaseの無料プランは7日間APIアクセスがないとプロジェクトが
# 自動的に一時停止するため、3日おきに軽いリクエストを送って防ぐ。
on:
  schedule:
    - cron: "0 3 */3 * *" # 3日おき、UTC 3:00（日本時間 正午）に実行
  workflow_dispatch: {} # 手動実行もできるようにしておく

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/emotion_tags?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
