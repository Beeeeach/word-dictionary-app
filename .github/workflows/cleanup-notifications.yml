name: Cleanup Old Notifications

# 5日より古い通知を1日1回削除する。
on:
  schedule:
    - cron: "0 19 * * *" # UTC 19:00 = 日本時間 翌 4:00
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup-notifications endpoint
        run: |
          curl -sf -X GET \
            "${{ secrets.APP_URL }}/api/cron/cleanup-notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
